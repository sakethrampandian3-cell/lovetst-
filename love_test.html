<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>love_test.py — running</title>
<style>
  :root{
    --bg: #1a1025;
    --panel: #221733;
    --bot-bubble: #3d2b56;
    --user-bubble: #ff5c8a;
    --user-bubble-text: #1a1025;
    --accent: #ffd166;
    --text: #f5ece6;
    --muted: #b6a8c9;
    --dot-red:#ff5f56; --dot-yellow:#ffbd2e; --dot-green:#27c93f;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background: radial-gradient(circle at 20% -10%, #2a1c40 0%, var(--bg) 55%);
    color:var(--text);
    font-family: 'Quicksand', 'Segoe UI', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }
  .terminal{
    width:100%;
    max-width:560px;
    background:var(--panel);
    border-radius:18px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:min(88vh, 760px);
  }
  .titlebar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px 16px;
    background:#150e20;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .dot{width:11px;height:11px;border-radius:50%;}
  .dot.red{background:var(--dot-red);}
  .dot.yellow{background:var(--dot-yellow);}
  .dot.green{background:var(--dot-green);}
  .filename{
    margin-left:8px;
    font-family:'JetBrains Mono','Courier New',monospace;
    font-size:12.5px;
    color:var(--muted);
    letter-spacing:0.3px;
  }
  .status{
    margin-left:auto;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--accent);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .status .pulse{
    width:7px;height:7px;border-radius:50%;background:var(--accent);
    animation:pulse 1.4s infinite ease-in-out;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}

  .chat{
    flex:1;
    overflow-y:auto;
    padding:22px 18px;
    display:flex;
    flex-direction:column;
    gap:14px;
    scroll-behavior:smooth;
  }
  .chat::-webkit-scrollbar{width:6px;}
  .chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px;}

  .row{display:flex; max-width:88%;}
  .row.bot{align-self:flex-start;}
  .row.user{align-self:flex-end;}

  .bubble{
    padding:11px 15px;
    border-radius:16px;
    line-height:1.45;
    font-size:15px;
    white-space:pre-wrap;
    animation: pop 0.22s ease-out;
  }
  @keyframes pop{
    from{opacity:0; transform:translateY(6px) scale(0.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .row.bot .bubble{
    background:var(--bot-bubble);
    border-bottom-left-radius:4px;
    color:var(--text);
  }
  .row.user .bubble{
    background:var(--user-bubble);
    color:var(--user-bubble-text);
    border-bottom-right-radius:4px;
    font-weight:600;
  }
  .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    margin:0 6px 4px;
    align-self:flex-end;
  }
  .row.bot .tag{align-self:flex-start;}

  .typing{
    display:flex;
    gap:4px;
    padding:13px 16px;
    background:var(--bot-bubble);
    border-radius:16px;
    border-bottom-left-radius:4px;
    width:fit-content;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;background:var(--muted);
    animation: bounce 1s infinite;
  }
  .typing span:nth-child(2){animation-delay:0.15s;}
  .typing span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}

  .finale{
    font-size:18px;
    font-weight:700;
    text-align:center;
    background:linear-gradient(90deg, var(--accent), var(--user-bubble));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    padding:6px 4px;
  }

  .inputbar{
    border-top:1px solid rgba(255,255,255,0.06);
    background:#150e20;
    padding:12px;
    display:flex;
    gap:8px;
  }
  .inputbar input{
    flex:1;
    background:#0f0916;
    border:1px solid rgba(255,255,255,0.08);
    color:var(--text);
    border-radius:12px;
    padding:11px 14px;
    font-size:15px;
    font-family:inherit;
    outline:none;
  }
  .inputbar input:focus{border-color:var(--accent);}
  .inputbar button{
    background:var(--accent);
    color:#1a1025;
    border:none;
    border-radius:12px;
    padding:0 18px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    font-family:inherit;
    transition:transform 0.1s ease;
  }
  .inputbar button:active{transform:scale(0.95);}
  .inputbar.choices{gap:10px;}
  .choice-btn{
    flex:1;
    background:transparent;
    border:1.5px solid var(--bot-bubble);
    color:var(--text);
    border-radius:12px;
    padding:11px 0;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    font-size:14px;
  }
  .choice-btn:hover{background:var(--bot-bubble);}
  .hint{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--muted);
    text-align:center;
    padding:6px 0 0;
  }
  .done-bar{
    text-align:center;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    padding:14px;
  }
</style>
</head>
<body>

<div class="terminal">
  <div class="titlebar">
    <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
    <span class="filename">love_test.py</span>
    <span class="status"><span class="pulse"></span>running</span>
  </div>

  <div class="chat" id="chat"></div>

  <div id="inputZone"></div>
</div>

<script>
const chat = document.getElementById('chat');
const inputZone = document.getElementById('inputZone');

let state = { step: 'name', name: '' };

function scrollDown(){ chat.scrollTop = chat.scrollHeight; }

function addBubble(text, who, opts={}){
  const row = document.createElement('div');
  row.className = 'row ' + who;
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (opts.finale ? ' finale' : '');
  bubble.textContent = text;
  row.appendChild(bubble);
  chat.appendChild(row);
  scrollDown();
}

function showTyping(callback, delay=550){
  const row = document.createElement('div');
  row.className = 'row bot';
  row.id = 'typingRow';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(t);
  chat.appendChild(row);
  scrollDown();
  setTimeout(() => {
    row.remove();
    callback();
  }, delay);
}

function botSays(text, opts={}){
  showTyping(() => addBubble(text, 'bot', opts));
}

function userSays(text){
  addBubble(text, 'user', {});
}

function setTextInput(placeholder, onSubmit, type='text'){
  inputZone.innerHTML = `
    <div class="inputbar">
      <input id="theInput" type="${type}" placeholder="${placeholder}" autocomplete="off" />
      <button id="sendBtn">send</button>
    </div>`;
  const input = document.getElementById('theInput');
  const btn = document.getElementById('sendBtn');
  input.focus();
  function submit(){
    const val = input.value.trim();
    if(val === '') return;
    onSubmit(val);
  }
  btn.onclick = submit;
  input.addEventListener('keydown', e => { if(e.key === 'Enter') submit(); });
}

function setChoiceInput(choices, onChoose){
  inputZone.innerHTML = `<div class="inputbar choices">${choices.map((c,i)=>`<button class="choice-btn" data-i="${i}">${c}</button>`).join('')}</div>`;
  inputZone.querySelectorAll('.choice-btn').forEach(b => {
    b.onclick = () => onChoose(b.textContent);
  });
}

function clearInput(){
  inputZone.innerHTML = '';
}

// ---- Step 1: name ----
function start(){
  botSays('whats you name');
  setTextInput('type your name…', (val) => {
    userSays(val);
    state.name = val;
    clearInput();
    botSays('heyyyyy ' + val, {});
    setTimeout(askLove, 700);
  });
}

// ---- Step 2: love loop ----
function askLove(){
  botSays('doo you love mee\nyes / no');
  setChoiceInput(['yes 💗','no'], (val) => {
    userSays(val);
    clearInput();
    if(val.toLowerCase().startsWith('n')){
      setTimeout(() => {
        botSays("hmm okkayy think again..");
        setTimeout(askLove, 700);
      }, 300);
    } else {
      setTimeout(askAmount, 700);
    }
  });
}

// ---- Step 3: how much ----
function askAmount(){
  botSays('howw muchhh? (in numbers)');
  setTextInput('e.g. 9999999999999', (val) => {
    const m = parseFloat(val.replace(/[^0-9.]/g, ''));
    userSays(val);
    clearInput();
    if(isNaN(m)){
      setTimeout(() => {
        botSays("thats not even a number silly, try again");
        setTimeout(askAmount, 600);
      }, 300);
      return;
    }
    setTimeout(() => verdict(m), 400);
  }, 'text');
}

function verdict(m){
  let line;
  if (m > 1e17) {
    line = 'tuff';
  } else if (m > 1e13) {
    line = 'okkayy but can love better';
  } else {
    line = "aintt enough";
  }
  botSays(line);
  setTimeout(finale, 900);
}

function finale(){
  botSays('yemaaaaadi aaaathaadi unna ennakuu thariyaa dii nee paathi naaa paathi senthu paatha siva jaaadi', {finale:true});
  setTimeout(() => {
    inputZone.innerHTML = '<div class="done-bar">— process finished, exit code 0 —</div>';
  }, 600);
}

start();
</script>

</body>
</html>
